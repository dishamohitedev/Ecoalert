<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — EcoAlert</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/profile.css" />
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="nav-logo"><span class="logo-leaf">🌿</span> EcoAlert</a>
    <button class="hamburger" id="hamburger">☰</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html"><span class="nav-icon">🏠</span> Home</a></li>
      <li><a href="map.html"><span class="nav-icon">🗺️</span> Map</a></li>
      <li><a href="report.html"><span class="nav-icon">📢</span> Report</a></li>
      <li><a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a></li>
      <li><a href="profile.html" class="active"><span class="nav-icon">👤</span> Profile</a></li>
    </ul>
    <div class="nav-actions">
      <button class="dark-mode-toggle" id="darkToggle">🌙</button>
      <img class="user-avatar" id="userAvatar" src="" alt="" />
      <button class="btn btn-sm btn-login" id="loginBtn">Sign In</button>
      <button class="btn btn-sm btn-logout" id="logoutBtn">Sign Out</button>
    </div>
  </nav>

  <div class="page-wrapper page-content">
    <div class="container container-sm">
      <!-- Not logged in -->
      <div id="profileAuthGate" class="auth-gate">
        <div class="card text-center" style="padding:60px 40px">
          <div style="font-size:3rem;margin-bottom:16px">👤</div>
          <h2 style="font-family:var(--font-display);font-size:1.4rem;margin-bottom:10px">Sign In to View Profile</h2>
          <p class="text-muted" style="margin-bottom:24px">Your eco-warrior profile awaits.</p>
          <button class="btn btn-primary" id="profileSignInBtn">Sign in with Google</button>
        </div>
      </div>

      <!-- Profile Content -->
      <div id="profileContent" style="display:none">
        <!-- Profile Header -->
        <div class="profile-header card fade-in">
          <div class="profile-avatar-wrap">
            <img id="profilePhoto" src="" alt="Avatar" class="profile-photo" />
            <div class="profile-badge" id="profileBadge">🌱</div>
          </div>
          <div class="profile-info">
            <h1 class="profile-name" id="profileName">Loading...</h1>
            <p class="profile-email" id="profileEmail"></p>
            <p class="profile-joined" id="profileJoined"></p>
            <div class="profile-role-badge" id="profileRoleBadge"></div>
          </div>
        </div>

        <!-- Profile Stats -->
        <div class="stats-grid fade-in stagger-1">
          <div class="stat-card">
            <div class="stat-icon">📢</div>
            <div class="stat-number" id="profReports">0</div>
            <div class="stat-label">Reports Filed</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-number" id="profResolved">0</div>
            <div class="stat-label">Resolved</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">👍</div>
            <div class="stat-number" id="profUpvotes">0</div>
            <div class="stat-label">Upvotes Earned</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🏅</div>
            <div class="stat-number" id="profRank">—</div>
            <div class="stat-label">Eco Rank</div>
          </div>
        </div>

        <!-- Badges -->
        <div class="card fade-in stagger-2">
          <h3 class="chart-title" style="font-family:var(--font-display);font-size:1rem;font-weight:700;margin-bottom:16px">🏅 Achievements</h3>
          <div class="badges-grid" id="badgesGrid"></div>
        </div>

        <!-- My Reports -->
        <div class="card fade-in stagger-3">
          <div class="flex justify-between items-center mb-4">
            <h3 style="font-family:var(--font-display);font-size:1rem;font-weight:700">📋 My Reports</h3>
            <a href="report.html" class="btn btn-primary btn-sm">+ New Report</a>
          </div>
          <div id="myReportsList">
            <div class="loading-centered"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="../js/pages/profile-page.js"></script>
</body>
</html>
