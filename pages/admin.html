<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — EcoAlert</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="nav-logo"><span class="logo-leaf">🌿</span> EcoAlert</a>
    <button class="hamburger" id="hamburger">☰</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html"><span class="nav-icon">🏠</span> Home</a></li>
      <li><a href="map.html"><span class="nav-icon">🗺️</span> Map</a></li>
      <li><a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a></li>
      <li><a href="admin.html" class="active"><span class="nav-icon">🛡️</span> Admin</a></li>
    </ul>
    <div class="nav-actions">
      <button class="dark-mode-toggle" id="darkToggle">🌙</button>
      <img class="user-avatar" id="userAvatar" src="" alt="" />
      <button class="btn btn-sm btn-logout" id="logoutBtn">Sign Out</button>
    </div>
  </nav>

  <div class="page-wrapper page-content">
    <div class="container">

      <!-- Access Denied -->
      <div id="adminAccessDenied" style="display:none">
        <div class="card text-center" style="padding:80px 40px; max-width:500px; margin:0 auto;">
          <div style="font-size:4rem;margin-bottom:20px">🚫</div>
          <h2 style="font-family:var(--font-display);font-size:1.6rem;margin-bottom:12px">Access Denied</h2>
          <p class="text-muted" style="margin-bottom:24px">You need admin privileges to access this panel.</p>
          <a href="../index.html" class="btn btn-primary">Go Home</a>
        </div>
      </div>

      <!-- Admin Content -->
      <div id="adminContent" style="display:none">
        <div class="admin-header fade-in">
          <div>
            <h1 class="section-title">🛡️ Admin Panel</h1>
            <p class="section-subtitle">Manage all community reports</p>
          </div>
          <div class="admin-header-actions">
            <div class="admin-live-indicator"><span class="live-dot"></span> Live Updates</div>
          </div>
        </div>

        <!-- Admin Stats -->
        <div class="stats-grid fade-in stagger-1 mb-4">
          <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-number" id="adminTotal">—</div><div class="stat-label">Total Reports</div></div>
          <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-number" id="adminPending" style="background:linear-gradient(135deg,#f59e0b,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">—</div><div class="stat-label">Needs Action</div></div>
          <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-number" id="adminResolved" style="background:linear-gradient(135deg,#10b981,#6ee7b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">—</div><div class="stat-label">Resolved Today</div></div>
          <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-number" id="adminUsers">—</div><div class="stat-label">Active Users</div></div>
        </div>

        <!-- Reports Management -->
        <div class="card fade-in stagger-2">
          <div class="table-header">
            <h3 style="font-family:var(--font-display);font-weight:700;font-size:1rem;margin:0">📋 All Reports</h3>
            <div class="table-filters">
              <select class="filter-select" id="adminFilterType">
                <option value="">All Types</option>
                <option value="garbage">Garbage</option>
                <option value="waterlogging">Waterlogging</option>
                <option value="smell">Bad Smell</option>
                <option value="air">Air Pollution</option>
                <option value="drainage">Open Drainage</option>
                <option value="road">Unsafe Road</option>
                <option value="smoke">Smoke</option>
              </select>
              <select class="filter-select" id="adminFilterStatus">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="in-progress">In Progress</option>
                <option value="resolved">Resolved</option>
              </select>
              <select class="filter-select" id="adminFilterSeverity">
                <option value="">All Severity</option>
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
          </div>

          <div class="admin-reports-list" id="adminReportsList">
            <div class="loading-centered" style="padding:60px"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmModal" style="display:none">
    <div class="modal glass-panel">
      <h3 class="modal-title" id="modalTitle">Confirm Action</h3>
      <p class="modal-body" id="modalBody"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modalCancel">Cancel</button>
        <button class="btn btn-danger" id="modalConfirm">Confirm</button>
      </div>
    </div>
  </div>

  <script type="module" src="../js/pages/admin-page.js"></script>
</body>
</html>
