<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citizen Dashboard — EcoAlert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .quick-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .quick-stat-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 20px;
      text-align: center;
      border: 1px solid var(--border-glass);
    }
    .quick-stat-number {
      font-size: 2rem;
      font-weight: 800;
      font-family: var(--font-display);
      background: linear-gradient(135deg, var(--accent-green), var(--accent-lime));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .quick-stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .action-buttons {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .report-item {
      padding: 16px;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background 0.2s;
    }
    .report-item:hover {
      background: var(--bg-glass-2);
    }
    .loading-spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-glass);
      border-top-color: var(--accent-green);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #map {
      height: 400px;
      border-radius: 20px;
      margin-bottom: 24px;
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-critical { background: #B71C1C20; color: #B71C1C; }
    .badge-high { background: #F4433620; color: #F44336; }
    .badge-medium { background: #FF980020; color: #FF9800; }
    .badge-low { background: #4CAF5020; color: #4CAF50; }
    .badge-active { background: #F4433620; color: #F44336; }
    .badge-resolved { background: #4CAF5020; color: #4CAF50; }
    
    /* User avatar in navbar */
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-glass-2);
      padding: 6px 16px 6px 12px;
      border-radius: 40px;
      border: 1px solid var(--border-glass);
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    .user-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="nav-logo"><span class="logo-leaf">🌿</span> EcoAlert</a>
    <div class="nav-actions">
      <button class="dark-mode-toggle" id="darkToggle">🌙</button>
      <div class="user-info" id="userInfo">
        <img class="user-avatar" id="userAvatar" src="" alt="Avatar">
        <span class="user-name" id="userName">Loading...</span>
      </div>
      <button class="btn btn-sm btn-logout" id="logoutBtn">Sign Out</button>
    </div>
  </nav>

  <div class="page-wrapper page-content">
    <div class="container">
      <div class="section-header">
        <h1 class="section-title">🏠 Citizen Dashboard</h1>
        <p class="section-subtitle" id="welcomeMsg">Loading...</p>
      </div>

      <!-- Quick Stats -->
      <div class="quick-stats">
        <div class="quick-stat-card">
          <div class="quick-stat-number" id="statTotal">0</div>
          <div class="quick-stat-label">Total Reports</div>
        </div>
        <div class="quick-stat-card">
          <div class="quick-stat-number" id="statActive">0</div>
          <div class="quick-stat-label">Active Issues</div>
        </div>
        <div class="quick-stat-card">
          <div class="quick-stat-number" id="statResolved">0</div>
          <div class="quick-stat-label">Resolved</div>
        </div>
        <div class="quick-stat-card">
          <div class="quick-stat-number" id="statUpvotes">0</div>
          <div class="quick-stat-label">Total Upvotes</div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <a href="report.html" class="btn btn-primary">📢 Report New Issue</a>
        <a href="map.html" class="btn btn-ghost">🗺️ View Full Map</a>
      </div>

      <!-- Map -->
      <div id="map"></div>

      <!-- Recent Reports -->
      <div class="card">
        <h3 style="margin-bottom: 16px;">📋 Recent Reports</h3>
        <div id="reportsList">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initAuth, signOutUser, getCurrentUser } from '../js/auth.js';
    import { fetchReports, upvoteReport } from '../js/reports.js';
    import { initDarkMode, toggleDarkMode, showToast, timeAgo } from '../js/utils.js';

    // Initialize dark mode
    initDarkMode();
    
    // DOM elements
    const darkToggle = document.getElementById('darkToggle');
    const logoutBtn = document.getElementById('logoutBtn');
    const userAvatar = document.getElementById('userAvatar');
    const userNameSpan = document.getElementById('userName');
    
    // Fix Dark Mode Toggle
    if (darkToggle) {
      const newDarkToggle = darkToggle.cloneNode(true);
      darkToggle.parentNode.replaceChild(newDarkToggle, darkToggle);
      
      newDarkToggle.addEventListener('click', (e) => {
        e.preventDefault();
        const isDark = toggleDarkMode();
        newDarkToggle.textContent = isDark ? '☀️' : '🌙';
      });
    }
    
    // Logout
    if (logoutBtn) {
      const newLogoutBtn = logoutBtn.cloneNode(true);
      logoutBtn.parentNode.replaceChild(newLogoutBtn, logoutBtn);
      
      newLogoutBtn.addEventListener('click', async (e) => {
        e.preventDefault();
        await signOutUser();
      });
    }
    
    let map = null;
    let markers = [];
    
    // Initialize map
    function initMap() {
      if (map) return;
      map = L.map('map').setView([19.076, 72.877], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);
    }
    
    // Clear markers
    function clearMarkers() {
      if (!map) return;
      markers.forEach(m => map.removeLayer(m));
      markers = [];
    }
    
    // Add markers to map
    function addMarkersToMap(reports) {
      if (!map) return;
      clearMarkers();
      
      const activeReports = reports.filter(r => r.status !== 'resolved').slice(0, 30);
      
      activeReports.forEach(report => {
        if (report.location?.lat && report.location?.lng) {
          let color = '#4CAF50';
          if (report.severity === 'critical') color = '#B71C1C';
          else if (report.severity === 'high') color = '#F44336';
          else if (report.severity === 'medium') color = '#FF9800';
          
          const marker = L.marker([report.location.lat, report.location.lng]).addTo(map);
          marker.bindPopup(`
            <div style="min-width: 200px;">
              <strong>${report.type || 'Issue'}</strong><br>
              ${report.description?.substring(0, 100) || ''}<br>
              <span style="color:${color}">⚠️ ${report.severity || 'Unknown'}</span><br>
              <small>📍 ${report.location?.address?.substring(0, 50) || 'Unknown'}</small><br>
              <button onclick="window.handleUpvote('${report.id}')" style="margin-top:5px;padding:4px 8px;cursor:pointer;">👍 ${report.upvotes || 0} Upvotes</button>
            </div>
          `);
          markers.push(marker);
        }
      });
    }
    
    // Make upvote available globally
    window.handleUpvote = async (reportId) => {
      await upvoteReport(reportId);
      loadData();
    };
    
    // Load all data
    async function loadData() {
      try {
        const reports = await fetchReports();
        const user = getCurrentUser();
        
        // Update user info in navbar
        if (user) {
          const displayName = user.displayName || user.email?.split('@')[0] || 'Citizen';
          userNameSpan.textContent = displayName;
          if (user.photoURL) {
            userAvatar.src = user.photoURL;
          } else {
            // Create initial avatar if no photo
            const initial = displayName.charAt(0).toUpperCase();
            userAvatar.src = `https://ui-avatars.com/api/?name=${initial}&background=2d7a2d&color=fff`;
          }
        }
        
        // Update stats
        const total = reports.length;
        const active = reports.filter(r => r.status === 'active').length;
        const resolved = reports.filter(r => r.status === 'resolved').length;
        
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statActive').textContent = active;
        document.getElementById('statResolved').textContent = resolved;
        
        // Calculate user's total upvotes received
        const userReports = reports.filter(r => r.userId === user?.uid);
        const totalUpvotes = userReports.reduce((sum, r) => sum + (r.upvotes || 0), 0);
        document.getElementById('statUpvotes').textContent = totalUpvotes;
        
        // Update welcome message
        const welcomeMsg = document.getElementById('welcomeMsg');
        if (welcomeMsg && user) {
          const name = user.displayName || user.email?.split('@')[0] || 'Citizen';
          welcomeMsg.textContent = `Welcome back, ${name}! You've made ${userReports.length} report${userReports.length !== 1 ? 's' : ''}.`;
        }
        
        // Add markers to map
        addMarkersToMap(reports);
        
        // Render recent reports list
        const reportsList = document.getElementById('reportsList');
        const recentReports = [...reports].sort((a, b) => {
          const aTime = a.createdAt?.seconds || 0;
          const bTime = b.createdAt?.seconds || 0;
          return bTime - aTime;
        }).slice(0, 15);
        
        if (recentReports.length === 0) {
          reportsList.innerHTML = '<div style="padding:40px;text-align:center">No reports yet. Be the first to report an issue!</div>';
          return;
        }
        
        reportsList.innerHTML = recentReports.map(r => {
          const severityClass = `badge-${r.severity || 'medium'}`;
          const statusClass = `badge-${r.status === 'resolved' ? 'resolved' : 'active'}`;
          const isUserReport = r.userId === user?.uid;
          
          return `
            <div class="report-item" onclick="window.location.href='map.html?reportId=${r.id}'">
              <div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:8px;">
                <div>
                  <strong style="font-size:1rem;">${r.type || 'Issue'}</strong>
                  <span class="badge ${severityClass}" style="margin-left:8px;">${r.severity || 'Medium'}</span>
                  <span class="badge ${statusClass}" style="margin-left:8px;">${r.status || 'Active'}</span>
                  ${isUserReport ? '<span class="badge" style="background:#2196F320;color:#2196F3;">📝 Your Report</span>' : ''}
                </div>
                <button onclick="event.stopPropagation(); window.handleUpvote('${r.id}')" style="background:none;border:none;cursor:pointer;font-size:1rem;padding:4px 8px;border-radius:20px;">
                  👍 ${r.upvotes || 0}
                </button>
              </div>
              <p style="margin:8px 0;color:var(--text-secondary);font-size:0.85rem;">${r.description?.substring(0, 120) || 'No description'}</p>
              <div style="display:flex;gap:16px;font-size:0.7rem;color:var(--text-muted);flex-wrap:wrap;">
                <span>📍 ${r.location?.address?.substring(0, 50) || 'Unknown location'}</span>
                <span>🕐 ${timeAgo(r.createdAt)}</span>
                <span>👤 ${r.userName || 'Anonymous'}</span>
              </div>
            </div>
          `;
        }).join('');
        
      } catch (error) {
        console.error('Error loading data:', error);
        document.getElementById('reportsList').innerHTML = '<div style="padding:40px;text-align:center;color:red;">Error loading reports. Please refresh the page.</div>';
      }
    }
    
    // Check authentication and load
    initAuth((user) => {
      if (!user) {
        window.location.href = '../index.html';
        return;
      }
      
      setTimeout(() => {
        initMap();
        loadData();
      }, 100);
    });
  </script>
</body>
</html>
