<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citizen Dashboard — EcoAlert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .quick-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .quick-stat-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 20px;
      text-align: center;
      border: 1px solid var(--border-glass);
    }
    .quick-stat-number {
      font-size: 2rem;
      font-weight: 800;
      font-family: var(--font-display);
      background: linear-gradient(135deg, var(--accent-green), var(--accent-lime));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .quick-stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .action-buttons {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .report-item {
      padding: 16px;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background 0.2s;
    }
    .report-item:hover {
      background: var(--bg-glass-2);
    }
    .loading-spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-glass);
      border-top-color: var(--accent-green);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #map {
      height: 400px;
      border-radius: 20px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="nav-logo"><span class="logo-leaf">🌿</span> EcoAlert</a>
    <div class="nav-actions">
      <button class="dark-mode-toggle" id="darkToggle">🌙</button>
      <span style="background:#2d7a2d;padding:6px 12px;border-radius:20px;font-size:0.8rem;">👤 Citizen</span>
      <button class="btn btn-sm btn-logout" id="logoutBtn">Sign Out</button>
    </div>
  </nav>

  <div class="page-wrapper page-content">
    <div class="container">
      <div class="section-header">
        <h1 class="section-title">🏠 Citizen Dashboard</h1>
        <p class="section-subtitle">Welcome back! Here's what's happening in your community</p>
      </div>

      <!-- Quick Stats -->
      <div class="quick-stats">
        <div class="quick-stat-card">
          <div class="quick-stat-number" id="statTotal">—</div>
          <div class="quick-stat-label">Total Reports</div>
        </div>
        <div class="quick-stat-card">
          <div class="quick-stat-number" id="statActive">—</div>
          <div class="quick-stat-label">Active Issues</div>
        </div>
        <div class="quick-stat-card">
          <div class="quick-stat-number" id="statResolved">—</div>
          <div class="quick-stat-label">Resolved</div>
        </div>
        <div class="quick-stat-card">
          <div class="quick-stat-number" id="statUpvotes">—</div>
          <div class="quick-stat-label">Your Upvotes</div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <a href="report.html" class="btn btn-primary">📢 Report New Issue</a>
        <a href="map.html" class="btn btn-ghost">🗺️ View Full Map</a>
      </div>

      <!-- Map -->
      <div id="map"></div>

      <!-- Recent Reports -->
      <div class="card">
        <h3 style="margin-bottom: 16px;">📋 Recent Reports Near You</h3>
        <div id="reportsList">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initAuth, signOutUser, getCurrentUser } from '../js/auth.js';
    import { fetchReports, upvoteReport } from '../js/reports.js';
    import { initDarkMode, toggleDarkMode, showToast, timeAgo } from '../js/utils.js';

    // Initialize
    initDarkMode();
    
    // DOM elements
    const darkToggle = document.getElementById('darkToggle');
    const logoutBtn = document.getElementById('logoutBtn');
    
    // Dark mode
    if (darkToggle) {
      darkToggle.addEventListener('click', () => {
        const isDark = toggleDarkMode();
        darkToggle.textContent = isDark ? '☀️' : '🌙';
      });
    }
    
    // Logout
    if (logoutBtn) {
      logoutBtn.addEventListener('click', async () => {
        await signOutUser();
      });
    }
    
    // Initialize map
    let map;
    function initMap() {
      map = L.map('map').setView([19.076, 72.877], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);
    }
    
    // Add markers to map
    function addMarkersToMap(reports) {
      if (!map) return;
      
      // Clear existing markers
      map.eachLayer((layer) => {
        if (layer instanceof L.Marker) {
          map.removeLayer(layer);
        }
      });
      
      const activeReports = reports.filter(r => r.status !== 'resolved').slice(0, 20);
      
      activeReports.forEach(report => {
        if (report.location?.lat && report.location?.lng) {
          const color = report.severity === 'critical' ? 'red' : 
                       report.severity === 'high' ? 'orange' : 
                       report.severity === 'medium' ? 'yellow' : 'green';
          
          const marker = L.marker([report.location.lat, report.location.lng]).addTo(map);
          marker.bindPopup(`
            <strong>${report.type}</strong><br>
            ${report.description?.substring(0, 100)}<br>
            <span style="color:${color}">⚠️ ${report.severity}</span><br>
            <button onclick="window.upvote('${report.id}')">👍 ${report.upvotes || 0}</button>
          `);
        }
      });
    }
    
    // Make upvote available globally
    window.upvote = async (reportId) => {
      await upvoteReport(reportId);
      loadData();
    };
    
    // Load all data
    async function loadData() {
      try {
        const reports = await fetchReports();
        const user = getCurrentUser();
        
        // Update stats
        document.getElementById('statTotal').textContent = reports.length;
        document.getElementById('statActive').textContent = reports.filter(r => r.status === 'active').length;
        document.getElementById('statResolved').textContent = reports.filter(r => r.status === 'resolved').length;
        
        // Get user's upvotes (simplified)
        const userReports = reports.filter(r => r.userId === user?.uid);
        const totalUpvotes = userReports.reduce((sum, r) => sum + (r.upvotes || 0), 0);
        document.getElementById('statUpvotes').textContent = totalUpvotes;
        
        // Add markers to map
        addMarkersToMap(reports);
        
        // Render recent reports list
        const reportsList = document.getElementById('reportsList');
        const recentReports = reports.slice(0, 10);
        
        if (recentReports.length === 0) {
          reportsList.innerHTML = '<div style="padding:40px;text-align:center">No reports yet. Be the first to report!</div>';
          return;
        }
        
        reportsList.innerHTML = recentReports.map(r => `
          <div class="report-item" onclick="window.location.href='map.html?reportId=${r.id}'">
            <div style="display:flex;justify-content:space-between;align-items:start">
              <div>
                <strong style="font-size:1rem;">${r.type || 'Issue'}</strong>
                <span class="badge badge-severity-${r.severity}" style="margin-left:8px;">${r.severity}</span>
                <span class="badge badge-status-${r.status}" style="margin-left:8px;">${r.status}</span>
              </div>
              <button onclick="event.stopPropagation(); window.upvote('${r.id}')" style="background:none;border:none;cursor:pointer;font-size:1rem;">
                👍 ${r.upvotes || 0}
              </button>
            </div>
            <p style="margin:8px 0;color:var(--text-secondary);font-size:0.85rem;">${r.description?.substring(0, 120)}${r.description?.length > 120 ? '...' : ''}</p>
            <div style="display:flex;gap:16px;font-size:0.7rem;color:var(--text-muted)">
              <span>📍 ${r.location?.address?.substring(0, 40) || 'Unknown'}</span>
              <span>🕐 ${timeAgo(r.createdAt)}</span>
            </div>
          </div>
        `).join('');
        
      } catch (error) {
        console.error('Error loading data:', error);
        document.getElementById('reportsList').innerHTML = '<div style="padding:40px;text-align:center">Error loading reports. Please refresh.</div>';
      }
    }
    
    // Check authentication and load
    initAuth((user) => {
      if (!user) {
        window.location.href = '../index.html';
        return;
      }
      initMap();
      loadData();
    });
  </script>
</body>
</html>
